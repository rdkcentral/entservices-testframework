name: tf-main-wf-part2

on:
  push:
    branches: [ main, develop, 'sprint/**', 'release/**' ]
  pull_request:
    branches: [ main, develop, 'sprint/**', 'release/**' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cloudstore-L1:
    uses: rdkcentral/entservices-cloudstore/.github/workflows/L1-tests.yml@develop
    with:
      caller_source: testframework

  cloudstore-L2:
